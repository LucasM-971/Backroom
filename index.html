<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Backrooms - Accueil</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --bg-color: #0f0e0a; /* Beaucoup plus sombre/noir */
            --highlight: #8c825a; /* Jaune maladif très faible */
            --text-color: #a8a085;
            --blood: #4a0000;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier Prime', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Scanline / VHS Effect Overlay */
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.4),
                rgba(0, 0, 0, 0.4) 1px,
                transparent 1px,
                transparent 3px
            );
            pointer-events: none;
            z-index: 100;
            animation: scrollLines 10s linear infinite;
        }

        @keyframes scrollLines {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }

        .noise {
            position: absolute;
            top: -100%;
            left: -100%;
            width: 300%;
            height: 300%;
            opacity: 0.15;
            z-index: 99;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            animation: grain 0.5s steps(10) infinite;
        }

        @keyframes grain {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-5%, -5%); }
            20% { transform: translate(-10%, 5%); }
            30% { transform: translate(5%, -10%); }
            40% { transform: translate(-5%, 15%); }
            50% { transform: translate(-10%, 5%); }
            60% { transform: translate(15%, 0); }
            70% { transform: translate(0, 10%); }
            80% { transform: translate(-15%, 0); }
            90% { transform: translate(10%, 5%); }
        }

        /* Container */
        .container {
            text-align: center;
            z-index: 20;
            padding: 4rem;
            border: 1px solid rgba(140, 130, 90, 0.2);
            background: rgba(10, 8, 5, 0.85); 
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            backdrop-filter: blur(5px);
            max-width: 600px;
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, transparent, rgba(255,0,0,0.1), transparent);
            z-index: -1;
            animation: borderFlash 6s infinite;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0 0 1rem 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            line-height: 0.9;
            color: #d1cbb8;
            text-shadow: 
                3px 3px 0px rgba(0,0,0,0.8),
                -1px -1px 0 rgba(100,0,0,0.3);
            animation: textGlitch 5s infinite forwards;
        }

        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 4rem;
            font-style: italic;
            color: #7a7052;
            letter-spacing: 2px;
            border-bottom: 1px solid #332f22;
            display: inline-block;
            padding-bottom: 5px;
        }

        .warning-text {
            color: #5e1818; 
            font-size: 0.75rem; 
            margin-bottom: 2rem;
            font-weight: bold;
            opacity: 0.8;
            animation: pulseWarning 2s infinite;
        }

        a.btn {
            display: inline-block;
            text-decoration: none;
            color: #d4cfba;
            border: 1px solid #524e3d;
            background: rgba(20, 20, 15, 0.8);
            padding: 1.2rem 4rem;
            font-size: 1.2rem;
            font-weight: normal;
            letter-spacing: 3px;
            transition: all 0.1s;
            cursor: pointer;
            position: relative;
            text-transform: uppercase;
        }

        a.btn:hover {
            background-color: #2b0e0e; /* Rouge sombre au survol */
            border-color: #5e1818;
            color: #ffcccc;
            box-shadow: 0 0 15px rgba(100, 0, 0, 0.4);
        }
        
        a.btn:active {
            transform: scale(0.98);
        }

        /* Animations */
        @keyframes textGlitch {
            0% { transform: skew(0deg); opacity: 1; }
            2% { transform: skew(10deg); text-shadow: -2px 0 red; opacity: 0.8; }
            4% { transform: skew(0deg); text-shadow: none; opacity: 1; }
            58% { transform: skew(0deg); }
            60% { transform: skew(-20deg) translateX(5px); opacity: 0.5; }
            61% { transform: skew(0deg); opacity: 1; }
            100% { transform: skew(0deg); }
        }

        @keyframes pulseWarning {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; text-shadow: 0 0 5px rgba(255,0,0,0.2); }
        }

        @keyframes borderFlash {
            0%, 90% { opacity: 0; }
            92% { opacity: 1; }
            94% { opacity: 0; }
            96% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* Vignette (dark corners) - Much stronger */
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 30%, #000000 95%);
            pointer-events: none;
            z-index: 15;
            opacity: 0.9;
            animation: breatheVignette 8s infinite ease-in-out;
        }

        @keyframes breatheVignette {
            0%, 100% { opacity: 0.9; transform: scale(1); }
            50% { opacity: 0.95; transform: scale(1.1); }
        }

        /* Blackouts */
        .blackout {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            animation: randomBlackout 13s infinite;
        }

        @keyframes randomBlackout {
            0% { opacity: 0; }
            95% { opacity: 0; }
            95.1% { opacity: 0.9; }
            95.2% { opacity: 0; }
            98% { opacity: 0; }
            98.1% { opacity: 1; }
            98.3% { opacity: 0; }
            100% { opacity: 0; }
        }

    </style>
</head>
<body>

    <div class="scanlines"></div>
    <div class="noise"></div>
    <div class="vignette"></div>
    <div class="blackout"></div>

    <div class="container">
        <h1>Backroom<br>Labyrinth</h1>
        <p class="subtitle">LEVEL 0 "THE LOBBY"</p>
        <p class="warning-text">⚠ ATTENTION : REALITY INTEGRITY < 15%</p>
        <p style="margin-bottom: 3rem; font-size: 0.8rem; opacity: 0.6; color: #8c825a;">SI VOUS N'ÊTES PAS PRUDENT ET QUE VOUS <br>NO-CLIPPEZ HORS DE LA RÉALITÉ...</p>
        <a href="lobby.html" class="btn">ENTRER</a>
    </div>

</body>
</html>
